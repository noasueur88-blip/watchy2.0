<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accès refusé</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0f14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
    .card{background:#13161e;border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:40px 32px;text-align:center;width:320px}
    .logo{font-size:48px;margin-bottom:16px}
    h1{font-size:20px;font-weight:500;color:#e3e5e8;margin-bottom:8px}
    p{color:#8e9297;font-size:13px;margin-bottom:24px}
    code{background:rgba(88,101,242,0.1);color:#7289da;padding:2px 6px;border-radius:4px;font-family:monospace}
    .btn{display:inline-block;background:#1a1d27;color:#e3e5e8;padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;border:0.5px solid rgba(255,255,255,0.07)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚫</div>
    <h1>Accès refusé</h1>
    <p>Ton compte Discord n'est pas autorisé.<br>Ajoute ton ID dans <code>OWNER_IDS</code>.</p>
    <a href="/logout" class="btn">← Retour</a>
  </div>
</body>
</html>
